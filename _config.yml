title: Vision Group
email: vision@example.edu
description: >-
  Research group website (Jekyll + Block template assets).
baseurl: ""
url: ""

# VLab logos (assets/images/logo/)
logo:
  nav: /assets/images/logo/VLAB-logo.png
  nav_white: /assets/images/logo/vlab-white.png
  nav_large: /assets/images/logo/VLAB-logo-large.png
  nav_white_large: /assets/images/logo/vlab-white-large.png

# Home page (landing-it-company style) — override in pages if needed
landing:
  hero_video: "/site-covers/home/hero-video.mp4"
  hero_title: "Empowering research through cutting-edge vision & learning"
  hero_subtitle: "Innovative methods and systems — from perception to multimodal intelligence — tailored for scientific impact."
  primary_cta_label: "People"
  primary_cta_url: "/people/"
  secondary_cta_label: "Research topics"
  secondary_cta_url: "/research/"
  services_kicker: "Research directions"
  services_heading: "A comprehensive view of the topics we work on."

# Optional: shown on the home page below research cards
sponsors:
  - name: Example Research Fund
    url: https://example.org/sponsor-a
    logo: /site-covers/sponsors/brand-logo-1.svg
  - name: Vision Industry Partner
    url: https://example.org/sponsor-b
    logo: /site-covers/sponsors/brand-logo-3.svg
  - name: University Initiative
    logo: /site-covers/sponsors/brand-logo-5.svg

# Site footer (also in _data/footer.yml; _includes/footer.html prefers _data)
footer:
  columns:
    - title: Research
      links:
        - label: Research directions
          url: /research/
        - label: Demos and projects
          url: /demos/
    - title: Group
      links:
        - label: People
          url: /people/
        - label: Open positions
          url: /job/
        - label: News
          url: /news/
    - title: Resources
      links:
        - label: Home
          url: /
  aside:
    title: Contact
    body: >-
      Reach out for collaborations, student visits, and sponsorship inquiries.

markdown: kramdown
permalink: pretty

collections:
  people:
    output: true
    permalink: /people/:path/
  research_topics:
    output: true
    permalink: /research/topics/:path/
  publications:
    output: true
    permalink: /publications/:path/
  projects:
    output: true
    permalink: /demos/:path/
  jobs:
    output: true
    permalink: /job/:path/
  news:
    output: true
    permalink: /news/:path/

defaults:
  - scope:
      path: ""
      type: "people"
    values:
      layout: person
  - scope:
      path: ""
      type: "research_topics"
    values:
      layout: topic
  - scope:
      path: ""
      type: "publications"
    values:
      layout: publication
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
  - scope:
      path: ""
      type: "jobs"
    values:
      layout: job
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "news"
    values:
      layout: news

exclude:
  - template
  - Gemfile
  - Gemfile.lock
  - README.md
