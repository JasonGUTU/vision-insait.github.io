{% assign job = include.job %}
<div class="d-flex flex-wrap gap-2 gap-md-3 align-items-baseline justify-content-between py-2 py-md-3 border-bottom">
   <div class="min-w-0 flex-grow-1">
      <h3 class="h6 mb-1 lh-sm">
         <a href="{{ job.url | relative_url }}" class="text-reset text-decoration-none">{{ job.title }}</a>
      </h3>
      {% if job.location %}<span class="badge bg-primary-subtle text-primary-emphasis rounded-pill" style="font-size: 0.7rem;">{{ job.location }}</span>{% endif %}
   </div>
   <a href="{{ job.url | relative_url }}" class="small text-nowrap text-decoration-none">{{ include.cta_label | default: "Details" }} <i class="bi bi-chevron-right"></i></a>
</div>
