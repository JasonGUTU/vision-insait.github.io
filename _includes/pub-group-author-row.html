{% assign member = include.member %}
{% assign avatar_index = include.avatar_index | default: 0 %}
<li class="mb-2 d-flex align-items-center">
   {% if member.photo %}
   <img src="{{ member.photo | relative_url }}" alt="" class="avatar avatar-xs rounded-circle me-2" />
   {% else %}
   {% assign ai = avatar_index | modulo: 7 | plus: 1 %}
   <img src="{{ '/assets/images/avatar/avatar-' | append: ai | append: '.jpg' | relative_url }}" alt="" class="avatar avatar-xs rounded-circle me-2" />
   {% endif %}
   <a href="{{ member.url | relative_url }}">{{ member.name_display | default: member.title }}</a>
</li>
