---
layout: default
---
<section class="py-5 py-lg-8">
   <div class="container">
      <div class="row">
         <div class="col-12">
            {% if page.title %}
            <h1 class="mb-3">{{ page.title }}</h1>
            {% endif %}
         </div>
      </div>
   </div>
</section>
<section class="pb-7">
   <div class="container">
      <div class="row">
         <div class="col-12">
            {% if page.use_prose == false %}
            <div>
               {{ content }}
            </div>
            {% else %}
            <div class="prose">
               {{ content }}
            </div>
            {% endif %}
         </div>
      </div>
   </div>
</section>
